name: CI

# Runs on every pull request (so the coverage gate blocks a merge) and on
# pushes to the default branch. BOTH line and branch coverage must be 100%.
on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  unit-tests:
    name: Unit tests + coverage (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [account-service, gateway]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests with 100% coverage gate (line + branch)
        working-directory: ${{ matrix.service }}
        run: |
          pytest \
            --cov=app \
            --cov-branch \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-report=json \
            --cov-fail-under=100

      - name: Report line and branch coverage separately
        working-directory: ${{ matrix.service }}
        run: |
          python - <<'PY'
          import json, sys
          t = json.load(open("coverage.json"))["totals"]
          line = 100.0 if not t["num_statements"] else 100 * t["covered_lines"] / t["num_statements"]
          branch = 100.0 if not t["num_branches"] else 100 * t["covered_branches"] / t["num_branches"]
          print(f"Line coverage:   {line:.2f}%")
          print(f"Branch coverage: {branch:.2f}%")
          if line < 100.0 or branch < 100.0:
              sys.exit("coverage below 100%")
          PY

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: ${{ matrix.service }}/coverage.xml

  integration-tests:
    name: End-to-end integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install both services' dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r account-service/requirements.txt
          pip install -r gateway/requirements.txt
          pip install pytest

      - name: Run integration suite (starts both services over HTTP)
        run: pytest integration
