name: CI

# Runs on every pull request (so the coverage gate blocks a merge) and on
# pushes to the default branch. Coverage must be >= 90% or the job fails.
on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  unit-tests:
    name: Unit tests + 90% coverage (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [account-service, gateway]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests with coverage gate (fail under 90%)
        working-directory: ${{ matrix.service }}
        run: |
          pytest \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=90

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: ${{ matrix.service }}/coverage.xml

  integration-tests:
    name: End-to-end integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install both services' dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r account-service/requirements.txt
          pip install -r gateway/requirements.txt
          pip install pytest

      - name: Run integration suite (starts both services over HTTP)
        run: pytest integration
