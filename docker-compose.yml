# Starts both services as independent containers on a shared network.
# Each service has its OWN in-container SQLite database — they never share one.
services:
  account-service:
    build: ./account-service
    # `expose` (not `ports`) keeps the Account Service internal-only: reachable
    # by the Gateway inside the compose network, but NOT published to the host.
    expose:
      - "8001"
    environment:
      - DATABASE_URL=sqlite:////data/account.db
    volumes:
      - account-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  gateway:
    build: ./gateway
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:////data/gateway.db
      # The Gateway calls the Account Service at this URL. Inside the compose
      # network the hostname is the service name.
      - ACCOUNT_SERVICE_URL=http://account-service:8001
    volumes:
      - gateway-data:/data
    depends_on:
      # Wait until the Account Service is actually healthy, not just started.
      account-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  account-data:
  gateway-data:
